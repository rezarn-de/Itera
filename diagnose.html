<script>
const sidebarToggle = document.getElementById('sidebar-toggle')
const sidebar = document.getElementById('sidebar')
const sidebarOverlay = document.getElementById('sidebar-overlay')
const burgerIcon = document.getElementById('burger-icon')

function openSidebar() {
  sidebar.classList.add('open')
  sidebarOverlay.classList.remove('hidden')
  sidebarOverlay.classList.add('open')
  burgerIcon.textContent = 'close'
}
function closeSidebar() {
  sidebar.classList.remove('open')
  sidebarOverlay.classList.remove('open')
  burgerIcon.textContent = 'menu'
  setTimeout(() => sidebarOverlay.classList.add('hidden'), 300)
}
sidebarToggle?.addEventListener('click', () => {
  if (sidebar.classList.contains('open')) closeSidebar()
  else openSidebar()
})
sidebarOverlay?.addEventListener('click', closeSidebar)
window.addEventListener('resize', () => { if (window.innerWidth >= 768) closeSidebar() })
</script>

      { k:'critical_concern', t:'radio', label:'Welche der folgenden Optionen ist derzeit Ihre kritischste Sorge?', required:true,
        opts:['Den Markt verstehen','Interne Teams abstimmen','Entscheidungsprozesse verbessern','Regulatorische Anforderungen managen','Kommunikation und Zusammenarbeit verbessern','Die richtigen externen Partner finden'] },
      { k:'urgency', t:'radio', label:'Wie dringend ist Ihr Handlungsbedarf?', required:true,
        opts:['Niedrig: wir befinden uns noch in der Sondierungsphase','Mittel: wir benötigen bald Vorbereitung','Hoch: wir stehen bereits unter operativem Druck','Kritisch: aktuelle Probleme beeinträchtigen die Geschäftsleistung'] }
    ]
  }
]

// ── State ──────────────────────────────────────────────────────────────────
let stepIdx = 0
const answers = {}
const TOTAL = SECTIONS.length

// ── Helpers ────────────────────────────────────────────────────────────────
const formArea     = document.getElementById('form-area')
const sectionHdr   = document.getElementById('section-header')
const resultArea   = document.getElementById('results-area')
const progressFill = document.getElementById('progress-fill')
const stepIndicator= document.getElementById('step-indicator')
const prevBtn      = document.getElementById('prev-btn')
const nextBtn      = document.getElementById('next-btn')
const navBtns      = document.getElementById('nav-buttons')

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function renderSection(){
  const sec = SECTIONS[stepIdx]
  const pct = Math.round(((stepIdx+1)/TOTAL)*100)
  progressFill.style.width = pct+'%'
  stepIndicator.textContent = `Schritt ${stepIdx+1} von ${TOTAL}`

  sectionHdr.innerHTML = `
    <div class="flex items-center gap-3 mb-1">
      <span class="material-symbols-outlined text-[#0F4C5C] text-2xl">${sec.icon}</span>
      <div>
        <div class="text-[10px] uppercase tracking-widest text-[#0F4C5C] font-bold">Abschnitt ${stepIdx+1} / ${TOTAL}</div>
        <h2 class="text-xl font-bold text-slate-900">${sec.title}</h2>
      </div>
    </div>
    <p class="text-sm text-slate-500">${sec.desc}</p>
  `

  let html = ''

  // Scale matrix
  if(sec.scale){
    html += `<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="scale-table w-full text-sm">
          <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
              <th class="text-left text-xs font-semibold text-slate-600 w-1/2">Aussage</th>
              ${[1,2,3,4,5].map(n=>`<th class="text-center text-xs font-bold text-[#0F4C5C] w-12">${n}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${sec.scale.map((stmt,i)=>{
              const savedVal = answers[`${sec.key}_scale_${i}`]
              return `<tr class="border-b border-slate-100">
                <td class="text-sm text-slate-700 font-medium py-3 pr-4">${esc(stmt)}</td>
                ${[1,2,3,4,5].map(n=>`<td class="text-center">
                  <input type="radio" name="${sec.key}_scale_${i}" value="${n}" ${savedVal==n?'checked':''} class="w-4 h-4 accent-[#0F4C5C]">
                </td>`).join('')}
              </tr>`
            }).join('')}
          </tbody>
        </table>
      </div>
      <div class="flex justify-between px-4 py-2 bg-slate-50 text-[10px] text-slate-400 font-medium">
        <span>1 = Stimme überhaupt nicht zu</span><span>5 = Stimme voll zu</span>
      </div>
    </div>`
  }

  // Questions
  sec.questions.forEach(q=>{
    const saved = answers[q.k]
    if(q.t==='text'){
      html += `<div class="bg-white rounded-2xl border border-slate-200 p-5">
        <label class="block text-sm font-semibold text-slate-800 mb-3">${q.label}${q.required?'<span class="text-red-500 ml-1">*</span>':''}</label>
        <input type="text" data-key="${q.k}" value="${esc(saved||'')}" placeholder="Ihre Antwort" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#0F4C5C]/30 focus:border-[#0F4C5C]"/>
      </div>`
    } else if(q.t==='textarea'){
      html += `<div class="bg-white rounded-2xl border border-slate-200 p-5">
        <label class="block text-sm font-semibold text-slate-800 mb-3">${q.label}${q.required?'<span class="text-red-500 ml-1">*</span>':''}</label>
        <textarea data-key="${q.k}" rows="4" placeholder="Ihre Antwort" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#0F4C5C]/30 focus:border-[#0F4C5C]">${esc(saved||'')}</textarea>
      </div>`
    } else if(q.t==='radio'){
      html += `<div class="bg-white rounded-2xl border border-slate-200 p-5">
        <div class="text-sm font-semibold text-slate-800 mb-3">${q.label}${q.required?'<span class="text-red-500 ml-1">*</span>':''}</div>
        <div class="grid gap-2">
          ${q.opts.map(o=>`<label class="radio-opt flex items-center gap-3 p-3 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition-colors">
            <input type="radio" name="${q.k}" value="${esc(o)}" ${saved===o?'checked':''} class="w-4 h-4 accent-[#0F4C5C]">
            <span class="text-sm text-slate-700">${esc(o)}</span>
          </label>`).join('')}
        </div>
      </div>`
    } else if(q.t==='checkbox'){
      const savedArr = saved||[]
      html += `<div class="bg-white rounded-2xl border border-slate-200 p-5">
        <div class="text-sm font-semibold text-slate-800 mb-3">${q.label}${q.required?'<span class="text-red-500 ml-1">*</span>':''}</div>
        <div class="grid gap-2">
          ${q.opts.map(o=>`<label class="check-opt flex items-center gap-3 p-3 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition-colors">
            <input type="checkbox" name="${q.k}" value="${esc(o)}" ${savedArr.includes(o)?'checked':''} class="w-4 h-4 accent-[#0F4C5C] rounded">
            <span class="text-sm text-slate-700">${esc(o)}</span>
          </label>`).join('')}
        </div>
      </div>`
    }
  })

  formArea.innerHTML = html
  prevBtn.disabled = stepIdx===0
  nextBtn.textContent = stepIdx===TOTAL-1 ? 'Diagnose absenden ✓' : 'Weiter'
  nextBtn.className = stepIdx===TOTAL-1
    ? 'px-5 py-2.5 rounded-xl bg-[#23C9AE] text-white text-sm font-bold'
    : 'px-5 py-2.5 rounded-xl bg-[#0F4C5C] text-white text-sm font-medium'
}

function saveCurrentStep(){
  const sec = SECTIONS[stepIdx]
  if(sec.scale){
    sec.scale.forEach((_,i)=>{
      const v = document.querySelector(`input[name="${sec.key}_scale_${i}"]:checked`)?.value
      if(v) answers[`${sec.key}_scale_${i}`] = parseInt(v)
    })
  }
  sec.questions.forEach(q=>{
    if(q.t==='text'||q.t==='textarea'){
      const v = document.querySelector(`[data-key="${q.k}"]`)?.value?.trim()
      if(v) answers[q.k]=v
    } else if(q.t==='radio'){
      const v = document.querySelector(`input[name="${q.k}"]:checked`)?.value
      if(v) answers[q.k]=v
    } else if(q.t==='checkbox'){
      answers[q.k]=[...document.querySelectorAll(`input[name="${q.k}"]:checked`)].map(x=>x.value)
    }
  })
}

// ── Submit & Results ────────────────────────────────────────────────────────
function clearDiagnoseErrors(){
  document.querySelectorAll('.diagnose-submit-error').forEach(el => el.remove())
}

function showDiagnoseError(message){
  clearDiagnoseErrors()
  const err = document.createElement('div')
  err.className = 'diagnose-submit-error bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700 mt-4'
  err.textContent = '⚠ Fehler bei der Analyse: ' + message
  formArea.appendChild(err)
}

async function submitDiagnose(){
  clearDiagnoseErrors()
  nextBtn.disabled = true
  nextBtn.textContent = 'Wird analysiert…'

  try {
    const res = await fetch('/.netlify/functions/diagnose', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(answers)
    })

    const raw = await res.json().catch(() => ({
      ok: false,
      error: 'Ungültige Server-Antwort'
    }))

    if(!res.ok || !raw.ok) throw new Error(raw.error || 'Server-Fehler')

    const result = raw.result
    if(!result || !Array.isArray(result.dimensions)) {
      throw new Error('Analyseergebnis unvollständig')
    }

    // Save to Supabase
    const { data: { user } } = await supabase.auth.getUser()
    await supabase.from('diagnose_responses').insert({
      user_id: user?.id,
      company_name: answers.companyname || answers.company_name || '',
      origin: result.origin || answers.hqcountry || answers.hq_country || '',
      target: result.target || answers.targetmarket || answers.target_market || '',
      answers: answers,
      result: result
    })

    showResults(result)
  } catch(e){
    nextBtn.disabled = false
    nextBtn.textContent = 'Erneut versuchen'
    showDiagnoseError(e.message || 'Unbekannter Fehler')
  }
}

function riskClass(r){ return r==='hoch'?'risk-hoch':r==='mittel'?'risk-mittel':'risk-niedrig' }
function scoreColor(s){ return s>=70?'#22c55e':s>=45?'#f59e0b':'#ef4444' }

function showResults(r){
  formArea.innerHTML = ''
  sectionHdr.innerHTML = ''
  navBtns.style.display = 'none'
  progressFill.style.width = '100%'

  const overall = r.overall_score || 0
  const dims = r.dimensions || []
  const actions = r.priority_actions || []

  resultArea.classList.remove('hidden')
  resultArea.innerHTML = `
    <!-- Header card -->
    <div class="result-card">
      <div class="flex flex-col md:flex-row items-center gap-6">
        <div class="score-circle" style="background:${scoreColor(overall)}22;color:${scoreColor(overall)}">${overall}</div>
        <div class="flex-1">
          <div class="text-xs uppercase tracking-widest text-[#0F4C5C] font-bold mb-1">Gesamtergebnis</div>
          <div class="text-2xl font-black text-slate-900 mb-1">${esc(r.readiness_level||'')}</div>
          <div class="text-sm text-slate-500">${esc(r.origin||'')} → ${esc(r.target||'')}</div>
        </div>
        <button onclick="exportResultPDF()" class="px-4 py-2 rounded-xl bg-[#0F4C5C] text-white text-sm font-medium">
          <span class="material-symbols-outlined align-middle text-base mr-1">download</span>PDF exportieren
        </button>
      </div>
    </div>

    <!-- Dimensions -->
    <div class="grid gap-4">
      <div class="text-xs uppercase tracking-widest text-slate-400 font-bold">Dimensionen</div>
      ${dims.map(d=>`
        <div class="result-card">
          <div class="flex items-start justify-between gap-4 mb-4">
            <div>
              <div class="font-bold text-slate-900">${esc(d.name)}</div>
              <span class="text-xs font-bold px-2 py-0.5 rounded-full ${riskClass(d.risk_level)}">${esc(d.risk_level||'')} Risiko</span>
            </div>
            <div class="score-circle text-lg" style="background:${scoreColor(d.score)}22;color:${scoreColor(d.score)};width:56px;height:56px">${d.score||0}</div>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-2 mb-4">
            <div style="width:${d.score||0}%;background:${scoreColor(d.score)}" class="h-2 rounded-full transition-all"></div>
          </div>
          <div class="grid md:grid-cols-2 gap-4 text-sm">
            <div>
              <div class="font-semibold text-slate-700 mb-2">Lücken identifiziert</div>
              <ul class="space-y-1">${(d.gaps||[]).map(g=>`<li class="flex gap-2 text-slate-600"><span class="text-red-400 mt-0.5">●</span>${esc(g)}</li>`).join('')}</ul>
            </div>
            <div>
              <div class="font-semibold text-slate-700 mb-2">Empfohlene Maßnahmen</div>
              <ul class="space-y-1">${(d.solutions||[]).map(s=>`<li class="flex gap-2 text-slate-600"><span class="text-green-500 mt-0.5">●</span>${esc(s)}</li>`).join('')}</ul>
            </div>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- Priority actions -->
    <div class="result-card">
      <div class="font-bold text-slate-900 mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-[#0F4C5C]">priority_high</span>
        Top Prioritätsmaßnahmen
      </div>
      <ol class="space-y-3">
        ${actions.map((a,i)=>`<li class="flex gap-3 text-sm">
          <span class="w-7 h-7 rounded-full bg-[#0F4C5C] text-white text-xs font-bold flex items-center justify-center flex-shrink-0 mt-0.5">${i+1}</span>
          <span class="text-slate-700">${esc(a)}</span>
        </li>`).join('')}
      </ol>
    </div>

    <!-- Recommendation -->
    <div class="result-card bg-[#0F4C5C]">
      <div class="font-bold text-white mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined">lightbulb</span>
        Empfehlung
      </div>
      <p class="text-sm text-white/90 leading-relaxed">${esc(r.market_entry_recommendation||'')}</p>
    </div>

    <!-- New diagnosis button -->
    <div class="text-center">
      <button onclick="location.reload()" class="px-6 py-3 rounded-xl bg-surface-container text-slate-700 text-sm font-medium hover:bg-surface-container-high transition-colors">
        Neue Diagnose starten
      </button>
    </div>
  `
  window.scrollTo({top:0,behavior:'smooth'})
}

window.exportResultPDF = () => window.print()

// ── Navigation ───────────────────────────────────────────────────────────────
prevBtn.addEventListener('click',()=>{ saveCurrentStep(); stepIdx--; renderSection(); window.scrollTo({top:0,behavior:'smooth'}) })
nextBtn.addEventListener('click',()=>{
  saveCurrentStep()
  if(stepIdx < TOTAL-1){ stepIdx++; renderSection(); window.scrollTo({top:0,behavior:'smooth'}) }
  else submitDiagnose()
})

renderSection()
</script>
</body>
</html>
